name: Cross-Platform Release Build

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: release / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Zig version
        run: zig version

      - name: Format check
        shell: bash
        run: zig fmt --check $(git ls-files '*.zig')

      - name: Test
        run: zig build test --summary all

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe --summary all

      - name: Smoke help
        run: zig build smoke -Doptimize=ReleaseSafe --summary all

      - name: Checksum
        shell: bash
        run: |
          BIN="zig-out/bin/zfetch"
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="zig-out/bin/zfetch.exe"; fi
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$BIN" > zfetch-${{ matrix.os }}.sha256
          else
            sha256sum "$BIN" > zfetch-${{ matrix.os }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zfetch-${{ matrix.os }}
          path: |
            zig-out/bin/zfetch
            zig-out/bin/zfetch.exe
            zfetch-${{ matrix.os }}.sha256
          if-no-files-found: error
